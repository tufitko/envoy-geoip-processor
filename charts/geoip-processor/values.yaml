image:
  repository: geoip-processor
  tag: latest
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {memory: 512Mi}

# Env for credentials (e.g. MAXMIND_LICENSE from a secret)
env: []
#  - name: MAXMIND_LICENSE
#    valueFrom: {secretKeyRef: {name: maxmind, key: license}}

# Content of /etc/geoip/config.yaml (see examples/config.yaml in the repo)
config:
  listen: {grpc: ":9000", admin: ":8080"}
  cache_dir: /var/cache/geoip
  ip_sources:
    - header: x-real-ip
    - header: x-forwarded-for
    - envoy: source_address
  databases: {}
  headers: {}

envoyExtensionPolicy:
  enabled: false
  # targetRef points at the Gateway the processor attaches to
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: my-gateway
  failOpen: true
  messageTimeout: 200ms
  # Requires Envoy Gateway >= v1.3 (attribute passing to ext_proc).
  requestAttributes: [source.address]

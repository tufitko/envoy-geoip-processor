# Gateway wired to the customized proxy via infrastructure.parametersRef.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: default
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: geoip-sidecar
  listeners:
    - name: http
      protocol: HTTP
      port: 80
